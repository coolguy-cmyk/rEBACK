<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>rEBACK</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* (your CSS unchanged, trimmed for brevity) */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a;
  color:#e8e8e8;
  font-family:'Space Mono', monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:2rem 1rem;
}
.tab-btn.active { color:#fff; border-bottom:2px solid #4ade80; }
.tab-content { display:none; }
.tab-content.active { display:block; }
.executor-item { background:#0f0f0f; padding:1rem; border-radius:10px; margin-bottom:1rem; }
.error { color:#ef4444; text-align:center; }
.loading { text-align:center; color:#888; }
</style>
</head>

<body>

<h1>rEBACK<span>_</span></h1>

<div class="tabs">
  <button class="tab-btn active" data-tab="home">HOME</button>
  <button class="tab-btn" data-tab="executors">EXECUTORS</button>
</div>

<div id="home" class="tab-content active">
  <p>Home content</p>
</div>

<div id="executors" class="tab-content">
  <div id="executor-container" class="loading">
    Loading executors...
  </div>
</div>

<script>
/* ---------- TAB SYSTEM (FIXED) ---------- */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabName = btn.dataset.tab;

    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

    document.getElementById(tabName).classList.add('active');
    btn.classList.add('active');

    if (tabName === 'executors') {
      loadExecutors();
    }
  });
});

/* ---------- FETCH WITH FALLBACK ---------- */
async function fetchExecutors() {
  const url = "https://weao.xyz/api/status/exploits";

  try {
    // try direct first
    const res = await fetch(url);
    if (!res.ok) throw new Error("Direct API failed");
    return await res.json();

  } catch (err) {
    console.warn("Direct failed, using proxy...");

    // fallback proxy
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);

    if (!res.ok) throw new Error("Proxy also failed");
    return await res.json();
  }
}

/* ---------- LOAD EXECUTORS ---------- */
async function loadExecutors() {
  const container = document.getElementById('executor-container');
  container.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const exploits = await fetchExecutors();

    if (!Array.isArray(exploits) || exploits.length === 0) {
      container.innerHTML = '<div class="error">No executors found</div>';
      return;
    }

    container.innerHTML = '';

    exploits.forEach(executor => {
      container.appendChild(createExecutorElement(executor));
    });

  } catch (error) {
    console.error("FULL ERROR:", error);

    container.innerHTML = `
      <div class="error">
        Failed to load executors.<br>
        ${error.message}
      </div>
    `;
  }
}

/* ---------- CREATE UI ---------- */
function createExecutorElement(executor) {
  const div = document.createElement('div');
  div.className = 'executor-item';

  div.innerHTML = `
    <strong>${executor.title || 'Unknown'}</strong><br>
    Version: ${executor.version || '?.?.?'}<br>
    Platform: ${executor.platform || 'Unknown'}<br>
    Status: ${executor.free ? 'FREE' : 'PAID'}<br>
    Updated: ${executor.updatedDate || 'Unknown'}
  `;

  return div;
}
</script>

</body>
</html>
